<!DOCTYPE html>
<html lang="ru">
<head>

  <title>Калькулятор затмений</title>
  <style>
    body {

<body>

<h1>Калькулятор затмений</h1>

<div class="container">
  <div class="input-row">
    <input type="date" id="theDate"/>
    <button onclick="calculate()">Рассчитать</button>
  </div>

  <div class="content-row">
    <div class="block">
      <h3>📅 Дата</h3>
      <div id="dateInfo"></div>
    </div>

    <div class="block">
      <h3>🌕 Затмения</h3>
      <div id="eclipseInfo" class="eclipse-info">Загрузка...</div>
    </div>

    <div class="block">
      <h3>♻️ Циклы</h3>
      <div id="cyclesInfo" class="cycles-container">Загрузка...</div>
    </div>
  </div>

  <div class="block" style="margin-top:24px; max-width:800px;">
    <h3>🌙 Луна</h3>
    <div id="lunaInfo" class="luna-info">
      Загрузка данных о новолуниях...
    </div>
  </div>

  <div class="saros-block">
    <h3>🔍 Поиск по серии Сароса</h3>

    <div class="saros-input">
      <input type="date" id="sarosInputDate" />

      <div class="dropdown" id="timingDropdown">
        <button class="dropbtn" id="timingBtn">Тайминг ▾</button>
        <div class="dropdown-content" id="timingMenu">
          <a href="#" data-timing="future">Будущие</a>
          <a href="#" data-timing="past">Прошлые</a>
        </div>
      </div>

      <div class="dropdown" id="typeDropdown">
        <button class="dropbtn" id="typeBtn">Тип затмения ▾</button>
        <div class="dropdown-content" id="typeMenu">
          <a href="#" data-type="all">Все</a>
          <a href="#" data-type="lunar">Только лунные</a>
          <a href="#" data-type="solar">Только солнечные</a>
        </div>
      </div>
    </div>

    <div id="sarosStatus" class="saros-status"></div>
    <div id="sarosList" class="saros-list"></div>
  </div>
</div>

<footer>Данные по затмениям и лунациям с сайта NASA • Циклы — приближённый астрономический расчёт</footer>

<script>
window.addEventListener('load', () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById("theDate").value = today;
  calculate();
});

function getJulianDate(d) {
  let y = d.getUTCFullYear(), m = d.getUTCMonth() + 1, dd = d.getUTCDate();
  if (m <= 2) { y--; m += 12; }
  let a = Math.floor(y / 100), b = 2 - a + Math.floor(a / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + dd + b - 1524.5;
}

function getBrownLunationNumber(d) {
  const jd = getJulianDate(d);
  const synodicMonth = 29.530588861;

  const lunation = (jd - baseJD) / synodicMonth;
  return Math.round(lunation) + 1;
}

function getMiussLunationNumber(d) {
  const bl = getBrownLunationNumber(d);
  return (d.getUTCFullYear() >= 2000) ? bl - 953 : null;
}

function getLunarDay(jd) {
  let age = (jd - 2451545.0) % 29.530588861;
  if (age < 0) age += 29.530588861;
  return Math.floor(age) + 1;
}

function getTarotArkan(d, m, y) {
  let s = d + m + y;
  while (s > 22) s = (s+'').split('').reduce((a,c)=>a+ +c, 0);
  return s || 22;
}

const tarot = ["","Маг","Верховная Жрица","Императрица","Император","Иерофант","Влюблённые","Колесница","Сила","Отшельник","Колесо Фортуны","Справедливость","Повешенный","Смерть","Умеренность","Дьявол","Башня","Звезда","Луна","Солнце","Суд","Мир","Шут"];

const cycles = [
  { name: "⏳ Семестр",          days: 177.1835,   short: "177 дн"     },
  { name: "⌛ Полусеместр",      days: 148.00,     short: "148 дн"     },
  { name: "🌑 Тритос",           days: 3986.63,    short: "~11 лет"    },
  { name: "🌗 Октаэтерис",       days: 2923.53,    short: "~8 лет"     },
  { name: "🌕 Метон",            days: 6939.688,   short: "~19 лет"    },
  { name: "🌒 Инекс",            days: 10571.951,  short: "~29 лет"    },
  { name: "🌘 Экселигмос",       days: 19755.963,  short: "~54 г 33 д" },
  { name: "🌙 Каллипп",          days: 27758.817,  short: "~76 лет"    },
  { name: "☀️ Сарос",            days: 6585.321,   short: "~18 г 11 д" }
];

function getNextCycleDate(dt, cycleDays) {
  const jd = getJulianDate(dt);
  const fullCycles = Math.floor(jd / cycleDays);
  const cycleStart = fullCycles * cycleDays;
  let fractional = jd - cycleStart;
  if (fractional < 0.0005) fractional = 0;
  let daysToAdd = cycleDays - fractional;
  if (daysToAdd < 0.5) daysToAdd += cycleDays;
  if (daysToAdd < 1) daysToAdd = 1;
  const nextJD = jd + daysToAdd;
  const msPerDay = 86400000;
  const refDate = new Date(Date.UTC(2000, 0, 1, 12, 0, 0));
  const refJD = 2451545.0;
  const deltaJD = nextJD - refJD;
  const nextDate = new Date(refDate.getTime() + deltaJD * msPerDay);
  const dd = String(nextDate.getUTCDate()).padStart(2,'0');
  const mm = String(nextDate.getUTCMonth() + 1).padStart(2,'0');
  const yyyy = nextDate.getUTCFullYear();
  return {
    days: Math.round(daysToAdd),
    dateStr: `${dd}.${mm}.${yyyy}`,
    iso: nextDate.toISOString().slice(0,10)
  };
}

function setDateAndCalculate(dateStr) {
  document.getElementById("theDate").value = dateStr;
  calculate();
}

// ─── Затмения ───────────────────────────────────────────────────────
let eclipses = [];

fetch('eclipses-1900-2050.json')
  .then(r => {
    if (!r.ok) throw new Error(`Не удалось загрузить eclipses-1900-2050.json (статус ${r.status})`);
    return r.json();
  })
  .then(data => {
    eclipses = data;
    document.getElementById("eclipseInfo").innerHTML += `<small style="color:#88ff88;"> (загружено ${data.length} затмений)</small>`;
    calculate();
  })
  .catch(err => {
    console.error('Ошибка загрузки затмений:', err);
    document.getElementById("eclipseInfo").innerHTML = 
      '<span class="error">Не удалось загрузить eclipses-1900-2050.json<br>Проверьте файл в той же папке</span>';
    calculate();
  });

function findEclipseInfo(dt) {
  const iso = dt.toISOString().slice(0,10);
  const exact = eclipses.find(e => e.date === iso);

  let prevSolar = null, nextSolar = null, prevLunar = null, nextLunar = null;
  let minPS = Infinity, minNS = Infinity, minPL = Infinity, minNL = Infinity;

  const targetJD = getJulianDate(dt);

  eclipses.forEach(e => {
    const eJD = getJulianDate(new Date(e.date + "T12:00:00Z"));
    const diff = eJD - targetJD;
    if (e.kind === "solar") {
      if (diff < 0 && Math.abs(diff) < minPS) { minPS = Math.abs(diff); prevSolar = {...e, diffDays: Math.round(minPS)}; }
      if (diff > 0 && diff < minNS) { minNS = diff; nextSolar = {...e, diffDays: Math.round(minNS)}; }
    } else {
      if (diff < 0 && Math.abs(diff) < minPL) { minPL = Math.abs(diff); prevLunar = {...e, diffDays: Math.round(minPL)}; }
      if (diff > 0 && diff < minNL) { minNL = diff; nextLunar = {...e, diffDays: Math.round(minNL)}; }
    }
  });

  return { exact, prevSolar, nextSolar, prevLunar, nextLunar };
}

// ─── Луна ───────────────────────────────────────────────────────────
let moonEvents = [];

fetch('bloodmoons.json')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(data => {
    moonEvents = data;
    calculate();
  })
  .catch(() => {
    document.getElementById("lunaInfo").innerHTML = 
      '<span class="error">Не удалось загрузить bloodmoons.json</span>';
  });

function findNearestMoon(dt, typeFilter = null) {
  const target = new Date(dt);
  let prev = null, next = null;
  let minP = Infinity, minN = Infinity;

  moonEvents.forEach(e => {
    const eDate = new Date(e.date + "T12:00:00Z");
    const diff = eDate - target;
    if ((!typeFilter || e.type.toLowerCase().includes(typeFilter.toLowerCase())) && diff < 0 && Math.abs(diff) < minP) {
      minP = Math.abs(diff);
      prev = { ...e, diffDays: Math.round(minP / 86400000) };
    }
    if ((!typeFilter || e.type.toLowerCase().includes(typeFilter.toLowerCase())) && diff > 0 && diff < minN) {
      minN = diff;
      next = { ...e, diffDays: Math.round(minN / 86400000) };
    }
  });

  return { prev, next };
}

// ─── Dropdown логика ────────────────────────────────────────────────────
document.querySelectorAll('.dropbtn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    const parent = this.parentElement;
    const isOpen = parent.classList.contains('show');
    
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
    
    if (!isOpen) parent.classList.add('show');
  });
});

document.addEventListener('click', function() {
  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
});

// ─── Поиск по Саросу ────────────────────────────────────────────────────
const sarosDateInput   = document.getElementById('sarosInputDate');
const sarosStatus      = document.getElementById('sarosStatus');
const sarosList        = document.getElementById('sarosList');
const timingBtn        = document.getElementById('timingBtn');
const typeBtn          = document.getElementById('typeBtn');

let selectedSaros = null;
let selectedDateISO = null;
let eclipseKindFilter = 'all';     // all | lunar | solar
let timingDirection   = 'future';  // future | past

function updateButtonTexts() {
  timingBtn.textContent = (timingDirection === 'future' ? "Будущие" : "Прошлые") + " ▾";
  if (eclipseKindFilter === 'all')   typeBtn.textContent = "Все ▾";
  if (eclipseKindFilter === 'lunar') typeBtn.textContent = "Только лунные ▾";
  if (eclipseKindFilter === 'solar') typeBtn.textContent = "Только солнечные ▾";
}

function refreshSarosList() {
  if (!selectedSaros || !selectedDateISO) return;
  const items = getSarosEclipses(selectedSaros, selectedDateISO, timingDirection);
  sarosList.innerHTML = renderSarosItems(items, timingDirection);
}

// ─── Функции для Сароса ─────────────────────────────────────────────────
function getSarosForDate(dateISO) {
  if (!eclipses || !eclipses.length) return null;
  const eclipse = eclipses.find(e => e.date === dateISO);
  return eclipse ? eclipse.saros : null;
}

function getSarosEclipses(saros, refISO, direction = 'future') {
  if (!eclipses) return [];
  const refDate = new Date(refISO + 'T12:00:00Z');
  const refJD = getJulianDate(refDate);

  let filter = e => e.saros === saros;
  if (eclipseKindFilter === 'lunar') filter = e => e.saros === saros && e.kind === 'lunar';
  if (eclipseKindFilter === 'solar') filter = e => e.saros === saros && e.kind === 'solar';

  let series = eclipses
    .filter(filter)
    .map(e => ({
      ...e,
      jd: getJulianDate(new Date(e.date + 'T12:00:00Z'))
    }))
    .sort((a, b) => a.jd - b.jd);

  let refIdx = -1;
  let minDiff = Infinity;
  series.forEach((e, i) => {
    const diff = Math.abs(e.jd - refJD);
    if (diff < minDiff) {
      minDiff = diff;
      refIdx = i;
    }
  });

  if (refIdx < 0) return [];

  let result = [];
  if (direction === 'future') {
    for (let i = refIdx + 1; i < series.length && result.length < 5; i++) {
      result.push(series[i]);
    }
  } else {
    for (let i = refIdx - 1; i >= 0 && result.length < 5; i--) {
      result.push(series[i]);
    }
    result.reverse();
  }
  return result;
}

function renderSarosItems(items, dir) {
  if (items.length === 0) {
    const kindText = eclipseKindFilter === 'lunar' ? 'лунных' : eclipseKindFilter === 'solar' ? 'солнечных' : '';
    return `<div style="color:#ffcc99; padding:12px; text-align:center;">
      В этой серии${kindText ? ` (${kindText})` : ''} больше нет ${dir === 'future' ? 'будущих' : 'прошлых'} затмений в базе.
    </div>`;
  }

  let html = '';
  const typeMap = { T: "Полное", A: "Кольцевое", H: "Гибридное", P: "Частичное" };

  items.forEach(e => {
    const kindRu = e.kind === 'solar' ? 'солнечное' : 'лунное';
    const typeRu = typeMap[e.type] || e.type;
    html += `
      <div class="saros-item">
        <span class="saros-date-link" onclick="setDateAndCalculate('${e.date}')">
          ${e.date}
        </span>
         — ${typeRu} ${kindRu}
      </div>
    `;
  });
  return html;
}

// События на пункты меню
document.querySelectorAll('#timingMenu a').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    timingDirection = link.dataset.timing;
    updateButtonTexts();
    refreshSarosList();
  });
});

document.querySelectorAll('#typeMenu a').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    eclipseKindFilter = link.dataset.type;
    updateButtonTexts();
    refreshSarosList();
  });
});

// Событие на дату
sarosDateInput.addEventListener('change', () => {
  const val = sarosDateInput.value.trim();
  if (!val) {
    sarosStatus.innerHTML = '';
    sarosList.innerHTML = '';
    selectedSaros = null;
    selectedDateISO = null;
    return;
  }

  const saros = getSarosForDate(val);
  if (!saros) {
    sarosStatus.innerHTML = `<span class="status-error">На выбранную дату нет затмения</span>`;
    sarosDateInput.classList.add('input-error');
    setTimeout(() => sarosDateInput.classList.remove('input-error'), 1200);
    sarosList.innerHTML = '';
    return;
  }

  selectedSaros = saros;
  selectedDateISO = val;
  sarosStatus.innerHTML = `Серия Сароса: <b style="color:#cc99ff; font-size:1.2rem;">${saros}</b>`;
  refreshSarosList();
});

updateButtonTexts();

// ─── Основной расчёт ────────────────────────────────────────────────────
function calculate() {
  const val = document.getElementById("theDate").value;
  if (!val) {
    document.getElementById("dateInfo").innerHTML = "<span class='error'>Выберите дату</span>";
    return;
  }

  const dt = new Date(val + "T12:00:00Z");
  const jd = getJulianDate(dt);
  const d = dt.getUTCDate(), mo = dt.getUTCMonth()+1, y = dt.getUTCFullYear();
  const monthRu = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"][mo-1];

  // Дата
  let dateHtml = `
    <div class="date-line"><strong>Дата:</strong> ${d} ${monthRu} ${y}</div>
    <div class="date-line"><strong>Лунация по Брауну:</strong> ${getBrownLunationNumber(dt)}</div>
    ${getMiussLunationNumber(dt) ? `<div class="date-line"><strong>Лунация по Миусу:</strong> ${getMiussLunationNumber(dt)}</div>` : ''}
    <div class="date-line"><strong>Лунный день:</strong> ${getLunarDay(jd)}</div>
    <div class="date-line"><strong>Аркан дня:</strong> ${getTarotArkan(d, mo, y)} — ${tarot[getTarotArkan(d, mo, y)]} ⚡</div>
  `;
  document.getElementById("dateInfo").innerHTML = dateHtml;

  // Затмения
  const info = findEclipseInfo(dt);
  let eclipseHtml = '';

  const typeTranslate = { T: "Полное", A: "Кольцевое", H: "Гибридное", P: "Частичное" };

  if (info.exact) {
    const t = typeTranslate[info.exact.type] || info.exact.type;
    eclipseHtml += `
      <div class="eclipse-today">
        Сегодня: ${t} ${info.exact.kind === "solar" ? "солнечное" : "лунное"} 
        <span class="eclipse-saros">С-${info.exact.saros}</span>
      </div>
    `;
  } else {
    eclipseHtml += `<div style="color:#ffcc88; font-weight:bold;">Затмения на эту дату нет</div>`;
  }

  if (info.prevSolar) {
    const t = typeTranslate[info.prevSolar.type] || info.prevSolar.type;
    eclipseHtml += `
      <div class="eclipse-prev">
        <span class="eclipse-label"><span class="eclipse-icon">☀️</span>Пред. солнечное:</span> 
        <span class="eclipse-date" onclick="setDateAndCalculate('${info.prevSolar.date}')">${info.prevSolar.date}</span> 
        (${info.prevSolar.diffDays} дн назад)<br>
        → ${t} <span class="eclipse-saros">С-${info.prevSolar.saros}</span>
      </div>
    `;
  }
  if (info.nextSolar) {
    const t = typeTranslate[info.nextSolar.type] || info.nextSolar.type;
    eclipseHtml += `
      <div class="eclipse-next">
        <span class="eclipse-label"><span class="eclipse-icon">☀️</span>След. солнечное:</span> 
        <span class="eclipse-date" onclick="setDateAndCalculate('${info.nextSolar.date}')">${info.nextSolar.date}</span> 
        (через ${info.nextSolar.diffDays} дн)<br>
        → ${t} <span class="eclipse-saros">С-${info.nextSolar.saros}</span>
      </div>
    `;
  }

  if (info.prevLunar) {
    const t = typeTranslate[info.prevLunar.type] || info.prevLunar.type;
    eclipseHtml += `
      <div class="eclipse-prev">
        <span class="eclipse-label"><span class="eclipse-icon">🌕</span>Пред. лунное:</span> 
        <span class="eclipse-date" onclick="setDateAndCalculate('${info.prevLunar.date}')">${info.prevLunar.date}</span> 
        (${info.prevLunar.diffDays} дн назад)<br>
        → ${t} <span class="eclipse-saros">С-${info.prevLunar.saros}</span>
      </div>
    `;
  }
  if (info.nextLunar) {
    const t = typeTranslate[info.nextLunar.type] || info.nextLunar.type;
    eclipseHtml += `
      <div class="eclipse-next">
        <span class="eclipse-label"><span class="eclipse-icon">🌕</span>След. лунное:</span> 
        <span class="eclipse-date" onclick="setDateAndCalculate('${info.nextLunar.date}')">${info.nextLunar.date}</span> 
        (через ${info.nextLunar.diffDays} дн)<br>
        → ${t} <span class="eclipse-saros">С-${info.nextLunar.saros}</span>
      </div>
    `;
  }

  document.getElementById("eclipseInfo").innerHTML = eclipseHtml;

  // Циклы
  let cyclesHtml = '';
  cycles.forEach(c => {
    const next = getNextCycleDate(dt, c.days);
    cyclesHtml += `
      <div class="cycle-item">
        <div>
          <span class="cycle-name">${c.name}</span>
          <span class="cycle-short">(${c.short})</span>
        </div>
        <span class="cycle-time">
          через ${next.days} дней — 
          <span class="cycle-date" onclick="setDateAndCalculate('${next.iso}')">${next.dateStr}</span>
        </span>
      </div>
    `;
  });
  cyclesHtml += `<span class="cycle-small">Это приближённый расчёт повторения конфигурации (не точные даты затмений) ±1–4 дня на длинных циклах</span>`;
  document.getElementById("cyclesInfo").innerHTML = cyclesHtml;

  // Луна — новолуния
  let lunaHtml = '';
  const nearestNew = findNearestMoon(dt, "New Moon");

  if (nearestNew.prev) {
    lunaHtml += `
      <div class="luna-event">
        🌑 От предыдущего новолуния: 
        <span class="luna-date" onclick="setDateAndCalculate('${nearestNew.prev.date}')">${nearestNew.prev.date}</span> 
        (${nearestNew.prev.diffDays} дн назад)
      </div>
    `;
  }
  if (nearestNew.next) {
    lunaHtml += `
      <div class="luna-event">
        🌑 До следующего новолуния: 
        <span class="luna-date" onclick="setDateAndCalculate('${nearestNew.next.date}')">${nearestNew.next.date}</span> 
        (через ${nearestNew.next.diffDays} дн)
      </div>
    `;
  }

  if (!nearestNew.prev && !nearestNew.next) {
    lunaHtml += '<span style="color:#ffcc88;">Нет данных о новолуниях в файле bloodmoons.json</span>';
  }

  document.getElementById("lunaInfo").innerHTML = lunaHtml;
}

document.getElementById("theDate").addEventListener("change", calculate);
</script>
